<header>
    <main>
        <form action="" class="reservation-form">
            <div class="reservation-content">
                <h3>Formulaire de réservation</h3>

                <label for="res-prod">Produit</label>
                <input id="res-prod" name="product" readonly />

                <label for="res-price">Prix</label>
                <input id="res-price" name="price" readonly />

                <label for="res-name">Votre nom</label>
                <input id="res-name" name="name" placeholder="Nom complet" />

                <label for="res-contact">Contact (email/tel)</label>
                <input id="res-contact" name="contact" placeholder="Email ou téléphone" />

                <label for="res-date">Date</label>
                <input id="res-date" type="date" name="date" required>

                <label for="res-time">Heure</label>
                <input id="res-time" type="time" name="time" required>

                <label for="res-qty">Nombre de plats</label>
                <input id="res-qty" type="number" name="quantity" min="1" value="1" required>

                <div class="reservation-actions">
                    <button id="res-cancel" type="button">Annuler</button>
                    <button id="res-confirm" type="submit">Confirmer</button>
                </div>
            </div>
        </form>
    </main>
</header>
